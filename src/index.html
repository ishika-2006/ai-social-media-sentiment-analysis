<!DOCTYPE html>
<html>
<head>
    <title>AI Social Media Sentiment Analyzer</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1f1c2c, #928DAB);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            padding: 30px;
            width: 420px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
            animation: fadeIn 1s ease-in-out;
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(20px);}
            to {opacity: 1; transform: translateY(0);}
        }

        h2 {
            color: #333;
            margin-bottom: 20px;
        }

        input {
            width: 90%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
            outline: none;
            margin-bottom: 15px;
            transition: 0.3s;
        }

        input:focus {
            border-color: #6c63ff;
            box-shadow: 0 0 5px #6c63ff;
        }

        button {
            padding: 12px 25px;
            background: linear-gradient(90deg, #6c63ff, #48c6ef);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
        }

        #loading {
            display: none;
            color: #ff9800;
            margin-top: 10px;
            font-weight: bold;
        }

        #result {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
            padding: 10px;
            border-radius: 8px;
        }

        .positive {
            color: green;
        }

        .negative {
            color: red;
        }

        .neutral {
            color: gray;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>🤖 AI Social Media Sentiment Analyzer</h2>

    <input type="text" id="textInput" placeholder="Type your sentence here...">

    <br>

    <button onclick="analyzeSentiment()">Analyze Sentiment</button>

    <p id="loading">Analyzing sentiment...</p>

    <div id="result"></div>
</div>

<script>
async function analyzeSentiment() {
    let text = document.getElementById("textInput").value;

    let resultDiv = document.getElementById("result");
    let loading = document.getElementById("loading");

    loading.style.display = "block";
    resultDiv.innerHTML = "";

    try {
        let response = await fetch("http://127.0.0.1:5000/api/analyze", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ text: text })
        });

        let data = await response.json();

        loading.style.display = "none";

        let sentiment = data.sentiment;

        let className = "";
        if (sentiment === "Positive") className = "positive";
        else if (sentiment === "Negative") className = "negative";
        else className = "neutral";

        resultDiv.innerHTML = "Sentiment: " + sentiment;
        resultDiv.className = className;

    } catch (error) {
        loading.style.display = "none";
        resultDiv.innerHTML = "⚠ Error connecting to backend";
        resultDiv.style.color = "red";
    }
}
</script>

</body>
</html>
